<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 찾기</title>
</head>
<body>
    <h1>비밀번호 찾기</h1>
    
    {% if error %}
        <p style="color:red">{{ error }}</p>
    {%endif %}

    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="아이디">
        <input type="text" name="phone_number" placeholder="전화번호">
        <button type="submit">확인</button>
    </form>
</body>
</html>
