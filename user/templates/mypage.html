<!-- templates/user/mypage.html -->

<h1>마이페이지</h1>

<h2>내 정보</h2>
<p>아이디: {{ user.username }}</p>
<p>닉네임: {{ user.nickname }}</p>

<a href="{% url 'edit_profile' %}">프로필 수정</a>

<hr>

<h2>내가 쓴 글</h2>

{% for post in my_posts %}
    <div>
        <h3>{{ post.title }}</h3>
        <a href="{% url 'post_detail' post.pk %}">보기</a>
        <a href="{% url 'post_update' post.pk %}">수정</a>
        <a href="{% url 'post_delete' post.pk %}">삭제</a>
    </div>
{% empty %}
    <p>작성한 글이 없습니다.</p>
{% endfor %}
