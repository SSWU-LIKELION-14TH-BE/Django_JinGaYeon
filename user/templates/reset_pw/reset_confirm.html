<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>새 비밀번호 설정</title>
</head>
<body>
    <h1>새 비밀번호 입력</h1>

    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">비밀번호 변경</button>
        </form>
    {% else %}
        <p>유효하지 않은 링크입니다.</p>
    {% endif %}
</body>
</html>
